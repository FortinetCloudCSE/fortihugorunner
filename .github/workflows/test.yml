name: Test

on:
  pull_request:
    branches:
      - dev
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/workflows/pr-checklist.yml'

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...
