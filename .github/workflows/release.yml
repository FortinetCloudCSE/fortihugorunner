name: Release

on:
  push:
    tags:
      - 'v*'  # Triggers only on version tags

jobs:
  build:
    name: Build and Release Binaries
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: 386

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract release notes from CHANGELOG
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        id: changelog
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Extract the block for this version: from the ## [vX.Y.Z] header to the next ## header
          NOTES=$(awk "/^## \[${TAG}\]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          # Write to file to avoid multiline env-var quoting issues
          echo "$NOTES" > /tmp/release_notes.md
          echo "notes_file=/tmp/release_notes.md" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build binary
        run: |
          BIN_NAME="fortihugorunner-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BIN_NAME="${BIN_NAME}.exe"
          fi
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o "$BIN_NAME"

      - name: Upload binary to release
        uses: softprops/action-gh-release@v1
        with:
          files: fortihugorunner-*
          body_path: ${{ steps.changelog.outputs.notes_file || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
